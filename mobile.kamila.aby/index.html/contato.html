<head>

  <!-- Link do Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Agricultura Familiar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">

            <a class="nav-link active" href="contato.html">Contato</a>
          </li>
        </ul>

  </nav>

  <!-- Título da Página -->
  <div class="container text-center my-5">
    <h1>Entre em Contato Conosco</h1>
  </div>

  <!-- Formulário de Contato -->
  <div class="container mb-5">
    <form>
      <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" class="form-control" id="nome" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="mensagem" class="form-label">Mensagem</label>
        <textarea class="form-control" id="mensagem" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
  </div>

  <!-- Informações de Contato (opcional) -->
  <div class="container text-center">
    <h3>Ou entre em contato por:</h3>
    <p>Email: <a href="mailto:gabyrpires.41@agricultura">gabyrpires.41@agricultura</a></p>
    <p>Telefone: (42)988333268</p>
  </div>

  <!-- Footer -->
  <footer class="bg-light text-center py-4">
    <p>&copy; gricultura-gaby kamilla</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
